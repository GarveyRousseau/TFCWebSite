<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Furry Scroll Landing</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>

/* ========================= */
/* VARIABLES */
/* ========================= */

:root{

--primary:#ff6a00;
--bg:#111;
--text:#ffffff;

}

/* ========================= */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#111;
color:white;
overflow-x:hidden;
}

/* ========================= */
/* HERO */
/* ========================= */

.hero{

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;

background:linear-gradient(180deg,#111,#000);

}

.hero h1{
font-size:4rem;
margin-bottom:20px;
}

.hero p{
opacity:.7;
}

/* ========================= */
/* WHITE TRANSITION */
/* ========================= */

.white-transition{

height:100vh;
background:white;
color:black;

display:flex;
align-items:center;
justify-content:center;

}

/* ========================= */
/* INFO SECTION */
/* ========================= */

.info{

height:120vh;
display:flex;
align-items:center;
justify-content:center;

}

.info-container{

width:80%;
display:flex;
gap:50px;
align-items:center;

}

.info-text{

width:50%;
font-size:1.2rem;

}

.info-img{

width:50%;
height:300px;
background:url("https://picsum.photos/600/400") center/cover;

}

/* ========================= */
/* PINNED SLIDES */
/* ========================= */

.slides{

height:100vh;

}

.slides-container{

display:flex;
height:100vh;

}

.slide{

min-width:100vw;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

font-size:3rem;

}

.slide:nth-child(1){background:#222;}
.slide:nth-child(2){background:#333;}
.slide:nth-child(3){background:#444;}
.slide:nth-child(4){background:#555;}

/* ========================= */
/* BLACK TRANSITION */
/* ========================= */

.black-transition{

height:100vh;
background:black;

display:flex;
align-items:center;
justify-content:center;

}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{

padding:60px;
background:#111;
text-align:center;

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">

<h1>Furry Community</h1>
<p>Scroll down to explore</p>

</section>

<!-- WHITE TRANSITION -->

<section class="white-transition">

<h2>Welcome to something random</h2>

</section>

<!-- INFO SECTION -->

<section class="info">

<div class="info-container">

<div class="info-text">

<h2>Who we are</h2>
<p>
Random placeholder text. Imagine some cool
community description here. People drawing,
coding, vibing and stuff.
</p>

</div>

<div class="info-img"></div>

</div>

</section>

<!-- SLIDES -->

<section class="slides">

<div class="slides-container">

<div class="slide">Slide 1</div>
<div class="slide">Slide 2</div>
<div class="slide">Slide 3</div>
<div class="slide">Slide 4</div>

</div>

</section>

<!-- BLACK TRANSITION -->

<section class="black-transition">

<h2>The End</h2>

</section>

<!-- FOOTER -->

<footer>

<p>Random Footer</p>

</footer>

<script>

gsap.registerPlugin(ScrollTrigger);

/* INFO SLIDE IN */

gsap.from(".info-text",{

x:-200,
opacity:0,

scrollTrigger:{
trigger:".info",
start:"top 70%"
}

});

/* PINNED SLIDES */

let slides = gsap.utils.toArray(".slide");

gsap.to(slides,{

xPercent:-100 * (slides.length - 1),
ease:"none",

scrollTrigger:{
trigger:".slides",
pin:true,
scrub:1,
snap:1/(slides.length-1),
end:()=>"+=" + document.querySelector(".slides-container").offsetWidth
}

});

</script>

</body>
</html>
